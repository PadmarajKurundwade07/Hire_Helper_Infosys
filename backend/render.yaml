services:
  - type: web
    name: hirehelper-backend
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.x
      # DB Connection: Use DATABASE_URL if available (automatically provided by Render PostgreSQL service)
      # Otherwise, Render will use individual env vars below configured in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "5000"
      # Email configuration - set these in Render dashboard
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   value: your_email@gmail.com
      # - key: SMTP_PASS
      #   value: your_app_password

# Note: DATABASE_URL, DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DB_PORT should be set in Render dashboard
# If using Render PostgreSQL service, it will automatically provide DATABASE_URL
# Otherwise, set them individually in the Render environment variables section
